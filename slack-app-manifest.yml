display_information:
  name: ResearchLoop
  description: Automated research sprint platform for HPC clusters
  background_color: "#1e293b"

features:
  app_home:
    messages_tab_enabled: true
    messages_tab_read_only_enabled: false
  bot_user:
    display_name: ResearchLoop
    always_online: false

oauth_config:
  scopes:
    bot:
      - chat:write
      - files:write
      - im:history
      - im:write
      - app_mentions:read

settings:
  event_subscriptions:
    # Replace YOUR_URL with your orchestrator URL
    request_url: https://YOUR_URL/api/slack/events
    bot_events:
      - app_mention
      - message.im
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
